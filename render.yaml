services:
  # ── Backend: Node/Express API ──────────────────────────────────────────────
  - type: web
    name: candidate-shortlisting-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Render static site URL after deploy

  # ── Frontend: React Static Site ───────────────────────────────────────────
  - type: web
    name: candidate-shortlisting-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your Render backend URL after deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
